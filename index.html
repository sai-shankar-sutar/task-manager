<!DOCTYPE html>

<html data-theme="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TaskFlow</title>

<link href="style.css" rel="stylesheet"/></head>
<body>
<div class="app">

<header class="header">
<div class="header-brand">
<h1>TaskFlow</h1>

</div>
<div class="header-right">
<div class="counters">
<span class="counter-badge pending" id="pendingCount">0 pending</span>
<span class="counter-badge done" id="doneCount">0 done</span>
</div>

<button aria-label="Toggle theme" class="theme-btn" id="themeToggle">
<span id="themeIcon">🌙</span>
<span id="themeLabel">Dark</span>
</button>
</div>
</header>

<div class="form-card">
<h2>New Task</h2>
<div class="form-row" id="taskForm">
<div class="form-group">
<label for="titleInput">Title</label>

<input autocomplete="off" id="titleInput" maxlength="80" placeholder="What needs to get done?" type="text"/>
</div>
<div class="form-group" style="max-width:180px">
<label for="catSelect">Category</label>
<select id="catSelect">
<option value="work">Work</option>
<option value="personal">Personal</option>
<option value="urgent">Urgent</option>
<option value="learning">Learning</option>
<option value="other">Other</option>
</select>
</div>
<button class="btn-add" id="addTaskBtn">＋ Add Task</button>
</div>

<div class="attr-prop-note" id="attrPropNote"></div>
</div>

<div class="controls-bar">
<input class="search-input" id="searchInput" placeholder="🔍  Search tasks…" type="text"/>
<button class="filter-btn active" data-filter="all">All</button>
<button class="filter-btn" data-filter="work">Work</button>
<button class="filter-btn" data-filter="personal">Personal</button>
<button class="filter-btn" data-filter="urgent">Urgent</button>
<button class="filter-btn" data-filter="completed">Done</button>
<button class="btn-clear-all" id="clearAllBtn">✕ Clear All</button>
</div>

<div class="task-list" id="taskList">
<div class="empty-state" id="emptyState">
<span class="empty-icon">📋</span>
      No tasks yet — add one above!
    </div>
</div>

<p class="section-title"><span class="section-badge">Demo</span> Event Propagation</p>
<div class="prop-demo-card">
<div class="prop-modes">
<span class="prop-label">Mode:</span>
<button class="mode-btn active" data-mode="bubble" id="bubbleBtn">Bubbling ↑</button>
<button class="mode-btn" data-mode="capture" id="captureBtn">Capturing ↓</button>
</div>
<div class="propagation-boxes">
<div class="gp-box" id="grandparent">
<span class="box-label">Grandparent</span>
<div class="p-box" id="parent">
<span class="box-label">Parent</span>
<div class="child-btn-wrap">
<span class="box-label">Child</span>
<button id="childBtn">Click me!</button>
</div>
</div>
</div>
</div>
<div class="log-box" id="propLog">
<span class="log-placeholder">Click the button above to see propagation in action…</span>
</div>
</div>

<p class="section-title"><span class="section-badge">Visual</span> Browser Rendering Pipeline</p>
<div class="pipeline-section">
<div class="pipeline-flow" id="pipelineFlow">

</div>
<div class="merge-row">
<span style="font-size:.8rem;color:var(--muted);font-weight:600;">DOM Tree + CSSOM Tree</span>
<span style="font-size:1.1rem">→</span>
<span class="merge-badge">Render Tree</span>
<span style="font-size:1.1rem">→</span>
<span class="merge-badge" style="background:var(--danger-lt);color:var(--danger)">Layout</span>
<span style="font-size:1.1rem">→</span>
<span class="merge-badge" style="background:var(--warn-lt);color:var(--warn)">Paint</span>
<span style="font-size:1.1rem">→</span>
<span class="merge-badge" style="background:var(--purple-lt);color:var(--purple)">Composite</span>
</div>

<div class="glossary-grid" id="glossaryGrid">

</div>
</div>
<p class="footer-note">

  </p>
</div>

<script src="script.js"></script></body>
</html>
